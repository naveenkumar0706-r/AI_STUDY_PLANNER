{% extends "base.html" %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="card auth-card">
    <h2>Delete "{{ object.title }}"?</h2>
    <p class="text-muted">This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-block">Yes, Delete</button>
        <a href="{% url 'tasks:list' %}" class="btn btn-outline btn-block mt-2">Cancel</a>
    </form>
</div>
{% endblock %}
