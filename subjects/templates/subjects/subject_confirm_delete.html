{% extends "base.html" %}
{% block title %}Delete Subject{% endblock %}
{% block content %}
<div class="card auth-card">
    <h2>Delete "{{ object.name }}"?</h2>
    <p class="text-muted">This will also delete all tasks and exams linked to this subject. This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-block">Yes, Delete</button>
        <a href="{% url 'subjects:list' %}" class="btn btn-outline btn-block mt-2">Cancel</a>
    </form>
</div>
{% endblock %}
